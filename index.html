<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gray Chat · no setup</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#1a1a1a; color:#d0d0d0; font-family:system-ui, sans-serif; height:100vh; display:flex; flex-direction:column; }
    #messages { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:0.5rem; }
    .msg { background:#2a2a2a; padding:0.5rem 1rem; border-radius:8px; max-width:70%; align-self:flex-start; }
    .msg.self { background:#3a3a3a; align-self:flex-end; }
    #input-area { display:flex; gap:0.5rem; padding:1rem; background:#222; border-top:1px solid #333; }
    #input-area input { flex:1; background:#333; border:none; padding:0.75rem; border-radius:8px; color:#eee; outline:none; }
    #input-area button { background:#444; border:none; color:#eee; padding:0.75rem 1.5rem; border-radius:8px; cursor:pointer; }
    #input-area button:hover { background:#555; }
  </style>
</head>
<body>
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" placeholder="Type a message..." />
    <button id="send">Send</button>
  </div>
  <script>
    const ws = new WebSocket('wss://echo.websocket.org');
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    ws.onmessage = (e) => {
      const msg = document.createElement('div');
      msg.className = 'msg';
      msg.textContent = e.data;
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    };

    const send = () => {
      const text = input.value.trim();
      if (!text) return;
      // echo locally
      const selfMsg = document.createElement('div');
      selfMsg.className = 'msg self';
      selfMsg.textContent = text;
      messagesDiv.appendChild(selfMsg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      ws.send(text);
      input.value = '';
    };

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>
